<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRMULA+ Feed Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div>
      <div class="brand"><span class="brand-mark">F+</span><div><strong>FRMULA+</strong><small>Feed Dashboard</small></div></div>
      <nav class="nav">
        <button class="nav-item active" data-view="overview">Overview</button>
        <button class="nav-item" data-view="feed">Feed</button>
        <button class="nav-item" data-view="sections">Sections</button>
        <button class="nav-item" data-view="media">Media</button>
        <button class="nav-item" data-view="push">Push</button>
      </nav>
    </div>
    <div class="sidebar-card">
      <p>Separate from the app so you can host it alone on Vercel or GitHub Pages.</p>
      <small>Edit <code>config.js</code> with your deployed API URL.</small>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <div>
        <h1 id="pageTitle">Overview</h1>
        <p class="muted">White / red / black dashboard for managing the Feed system.</p>
      </div>
      <button class="primary-btn" id="refreshBtn">Refresh</button>
    </header>

    <section id="app"></section>
  </main>

  <dialog id="editorDialog">
    <form method="dialog" class="dialog-card" id="editorForm">
      <div class="dialog-head">
        <h3 id="dialogTitle">New post</h3>
        <button class="ghost-btn" value="cancel">✕</button>
      </div>
      <div class="form-grid" id="formFields"></div>
      <div class="dialog-actions">
        <button class="ghost-btn" value="cancel">Cancel</button>
        <button class="primary-btn" id="saveBtn" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
