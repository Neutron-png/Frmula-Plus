<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRMULA+ Admin Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:40px;width:100%;max-width:380px;margin:20px}
.logo{text-align:center;font-size:24px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.logo span{color:#e10600}
.subtitle{text-align:center;color:#666;font-size:12px;margin-bottom:32px;letter-spacing:1px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;color:#999;margin-bottom:6px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.form-group input{width:100%;padding:12px 14px;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;color:#fff;font-size:14px;font-family:inherit}
.form-group input:focus{outline:none;border-color:#e10600}
.login-btn{width:100%;padding:14px;background:#e10600;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.5px;transition:background .2s}
.login-btn:hover{background:#c00500}
.error{color:#ef4444;font-size:12px;text-align:center;margin-top:12px;display:none}
.line{height:2px;background:linear-gradient(90deg,transparent,#e10600,transparent);margin:24px 0;border-radius:1px}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">F<span>RMULA+</span></div>
  <div class="subtitle">ADMIN DASHBOARD</div>
  <div class="line"></div>
  <form onsubmit="login(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn">SIGN IN</button>
    <div class="error" id="error"></div>
  </form>
</div>
<script>
async function login(e) {
  e.preventDefault();
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  try {
    const res = await fetch('/admin/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('admin_token', data.token);
      window.location.href = '/admin';
    } else {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
    }
  } catch (err) {
    errEl.textContent = 'Connection error';
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
